modules:
  - type: dnf
    install:
      packages:
        - solaar-udev
        - lm_sensors
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - fedora-flathub-remote
        - fedora-workstation-repositories
        - brltty

  - type: dnf
    install:
      install-weak-deps: false
      packages:
        - plasma-discover
        - plasma-discover-flatpak
        - plasma-discover-rpm-ostree
