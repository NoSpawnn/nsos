---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

# image will be published to ghcr.io/<user>/<name>
name: nsos-desktop-gnome
# description will be included in the image's metadata
description: "NSOS Custom Desktop Image (GNOME)"

# the base image to build on top of (FROM) and the version tag to use
base-image: quay.io/fedora-ostree-desktops/silverblue
image-version: 42

modules:
  - from-file: base.yml
  - from-file: desktop/shared.yml
  - from-file: desktop/module-recipes/default-flatpaks.yml
  - from-file: desktop/module-recipes/dnf.yml
  - from-file: desktop/module-recipes/systemd.yml
  - from-file: desktop/module-recipes/fonts.yml
  - from-file: desktop/module-recipes/gnome-extensions.yml

  - type: default-flatpaks
    configurations:
      - scope: system
        repo:
          title: Flathub
          name: flathub
          url: https://dl.flathub.org/repo/flathub.flatpakrepo
        install:
          - org.gnome.Calculator
          - org.gnome.Calendar
          - org.gnome.Characters
          - org.gnome.Connections
          - org.gnome.Contacts
          - org.gnome.DejaDup
          - org.gnome.FileRoller
          - org.gnome.Firmware
          - org.gnome.Logs
          - org.gnome.Loupe
          - org.gnome.NautilusPreviewer
          - org.gnome.Papers
          - org.gnome.SimpleScan
          - org.gnome.TextEditor
          - org.gnome.baobab
          - org.gnome.clocks
          - org.gnome.font-viewer

  - type: os-release
    properties:
      ID: nsos-desktop-gnome
      ID_LIKE: fedora
      NAME: NS-OS
      PRETTY_NAME: NS-OS Desktop (GNOME)

  - type: signing
